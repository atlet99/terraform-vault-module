name: Terraform Module Releaser

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Terraform Module Releaser
        uses: techpivot/terraform-module-releaser@e481d6ddf336ed634db9b3dff9357a8ba51d7b58 # v2.0.0
        with:
          semver-mode: conventional-commits
          default-semver-level: patch
          default-first-tag: v1.0.0
          terraform-docs-version: v0.21.0
          delete-legacy-tags: true
          disable-wiki: false
          wiki-sidebar-changelog-max: 10
          module-change-exclude-patterns: ".gitignore,*.md,docs/**,examples/**,*.tftest.hcl,tests/**"
          module-asset-exclude-patterns: ".gitignore,*.md,*.tftest.hcl,tests/**"
          use-version-prefix: true
          module-ref-mode: tag
